name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: Build Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync meson.build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          perl -0777 -i -pe "s/project\('([^']+)', 'vala', 'c', version: '[^']+'\)/project('\\1', 'vala', 'c', version: '${TAG_VERSION}')/" meson.build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            pkg-config \
            zip \
            libglib2.0-dev \
            libgee-0.8-dev \
            libjson-glib-dev

      - name: Configure, build, and test
        run: |
          meson setup build-release --buildtype=release
          meson compile -C build-release
          meson test -C build-release --print-errorlogs

      - name: Create Ubuntu bundle
        run: |
          PROJECT_SLUG="${GITHUB_REPOSITORY##*/}"
          VERSION="${GITHUB_REF_NAME:-dev-${GITHUB_RUN_NUMBER}}"
          mkdir -p dist
          cp -a build-release/src/vamposer "dist/vamposer"
          cp -a build-release/src/vamposer "vamposer-linux"
          sha256sum "vamposer-linux" > "vamposer-linux.sha256"
          tar -C dist -czf "vamposer-${VERSION}-ubuntu.tar.gz" vamposer
          (cd dist && zip -r "../${PROJECT_SLUG}-${VERSION}-linux.zip" .)

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            PKG_VERSION="${GITHUB_REF_NAME#v}"
            PKG_RELEASE="1"
          else
            PKG_VERSION="0.0.0"
            PKG_RELEASE="0.${GITHUB_RUN_NUMBER}"
          fi

          mkdir -p pkg/deb/DEBIAN pkg/deb/usr/bin
          cp -a build-release/src/vamposer pkg/deb/usr/bin/vamposer
          chmod 0755 pkg/deb/usr/bin/vamposer
          cat > pkg/deb/DEBIAN/control <<EOF
          Package: vamposer
          Version: ${PKG_VERSION}-${PKG_RELEASE}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ValaFoundation <team@valafoundation.github.io>
          Depends: libc6, libglib2.0-0, libgee-0.8-2, libjson-glib-1.0-0
          Description: Dependency manager for Vala projects
           Vamposer manages git and system dependencies for Vala/Meson apps.
          EOF
          dpkg-deb --build pkg/deb "vamposer_${PKG_VERSION}-${PKG_RELEASE}_amd64.deb"

      - name: Upload Ubuntu artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-ubuntu
          if-no-files-found: error
          path: |
            build-release/src/vamposer
            vamposer-*-ubuntu.tar.gz
            *-linux.zip
            vamposer-linux
            vamposer-linux.sha256
            vamposer_*_amd64.deb

  build-fedora:
    name: Build Fedora ${{ matrix.fedora_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora_version: [41, 42, 43, 44]
    container:
      image: fedora:${{ matrix.fedora_version }}
    steps:
      - name: Install toolchain
        run: |
          dnf -y update
          dnf -y install \
            git \
            meson \
            ninja-build \
            vala \
            gcc \
            rpm-build \
            pkgconf-pkg-config \
            glib2-devel \
            libgee-devel \
            json-glib-devel

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync meson.build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          perl -0777 -i -pe "s/project\('([^']+)', 'vala', 'c', version: '[^']+'\)/project('\\1', 'vala', 'c', version: '${TAG_VERSION}')/" meson.build

      - name: Configure, build, and test
        run: |
          meson setup build-release --buildtype=release
          meson compile -C build-release
          meson test -C build-release --print-errorlogs

      - name: Create Fedora bundle
        run: |
          VERSION="${GITHUB_REF_NAME:-dev-${GITHUB_RUN_NUMBER}}"
          mkdir -p dist
          cp -a build-release/src/vamposer "dist/vamposer"
          tar -C dist -czf "vamposer-${VERSION}-fedora${{ matrix.fedora_version }}.tar.gz" vamposer

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            PKG_VERSION="${GITHUB_REF_NAME#v}"
            PKG_RELEASE="1"
          else
            PKG_VERSION="0.0.0"
            PKG_RELEASE="0.${GITHUB_RUN_NUMBER}"
          fi

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp -a build-release/src/vamposer rpmbuild/SOURCES/vamposer
          cat > rpmbuild/SPECS/vamposer.spec <<EOF
          Name:           vamposer
          Version:        ${PKG_VERSION}
          Release:        ${PKG_RELEASE}%{?dist}
          Summary:        Dependency manager for Vala projects
          License:        Apache-2.0
          Packager:       ValaFoundation
          Vendor:         ValaFoundation
          URL:            https://github.com/ValaFoundation/vamposer
          Source0:        vamposer
          BuildArch:      x86_64
          Requires:       glib2, libgee, json-glib

          %description
          Vamposer manages git and system dependencies for Vala/Meson apps.

          %prep

          %build

          %install
          install -Dpm 0755 %{SOURCE0} %{buildroot}/usr/bin/vamposer

          %files
          /usr/bin/vamposer

          %changelog
          * Fri Jul 11 2026 ValaFoundation - ${PKG_VERSION}-${PKG_RELEASE}
          - Automated release build
          EOF
          rpmbuild -bb --define "_topdir $(pwd)/rpmbuild" rpmbuild/SPECS/vamposer.spec

      - name: Upload Fedora artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-fedora-${{ matrix.fedora_version }}
          if-no-files-found: error
          path: |
            build-release/src/vamposer
            vamposer-*-fedora${{ matrix.fedora_version }}.tar.gz
            rpmbuild/RPMS/**/*.rpm

  build-arch:
    name: Build Arch
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install toolchain
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git \
            meson \
            ninja \
            vala \
            gcc \
            pkgconf \
            glib2 \
            libgee \
            json-glib

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync meson.build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          perl -0777 -i -pe "s/project\('([^']+)', 'vala', 'c', version: '[^']+'\)/project('\\1', 'vala', 'c', version: '${TAG_VERSION}')/" meson.build

      - name: Configure, build, and test
        run: |
          meson setup build-release --buildtype=release
          meson compile -C build-release
          meson test -C build-release --print-errorlogs

      - name: Create Arch bundle
        run: |
          VERSION="${GITHUB_REF_NAME:-dev-${GITHUB_RUN_NUMBER}}"
          mkdir -p dist
          cp -a build-release/src/vamposer "dist/vamposer"
          tar -C dist -czf "vamposer-${VERSION}-arch.tar.gz" vamposer

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-arch
          if-no-files-found: error
          path: |
            build-release/src/vamposer
            vamposer-*-arch.tar.gz

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync meson.build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          perl -0777 -i -pe "s/project\('([^']+)', 'vala', 'c', version: '[^']+'\)/project('\\1', 'vala', 'c', version: '${TAG_VERSION}')/" meson.build

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Create Flatpak manifest
        run: |
          mkdir -p packaging/flatpak
          cat > packaging/flatpak/io.github.valafoundation.vamposer.yml << 'EOF'
          app-id: io.github.valafoundation.vamposer
          runtime: org.gnome.Platform
          runtime-version: '47'
          sdk: org.gnome.Sdk
          command: vamposer
          build-commands:
            - install -Dm644 packaging/flatpak/io.github.valafoundation.vamposer.metainfo.xml /app/share/metainfo/io.github.valafoundation.vamposer.metainfo.xml
          finish-args:
            - --share=network
          modules:
            - name: vamposer
              buildsystem: meson
              config-opts:
                - --prefix=/app
                - -Dbuild_tests=false
              sources:
                - type: dir
                  path: ../../
          EOF

      - name: Build Flatpak bundle
        run: |
          VERSION="${GITHUB_REF_NAME:-dev-${GITHUB_RUN_NUMBER}}"
          flatpak-builder --force-clean flatpak-build packaging/flatpak/io.github.valafoundation.vamposer.yml
          flatpak build-export flatpak-repo flatpak-build
          flatpak build-bundle flatpak-repo "vamposer-${VERSION}-flatpak.flatpak" io.github.valafoundation.vamposer

      - name: Upload Flatpak artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-flatpak
          if-no-files-found: error
          path: |
            vamposer-*-flatpak.flatpak
            packaging/flatpak/io.github.valafoundation.vamposer.yml

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-ubuntu
      - build-fedora
      - build-arch
      - build-flatpak
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RELEASE_RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RELEASE_RANGE="${CURRENT_TAG}"
          fi

          {
            echo "## Changes"
            echo
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              echo
            else
              echo "Initial release changes:"
              echo
            fi

            while IFS='|' read -r commit_sha commit_subject; do
              [ -n "${commit_sha}" ] || continue
              github_login="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${commit_sha}" --jq '.author.login // empty' 2>/dev/null || true)"
              short_sha="$(printf '%s' "${commit_sha}" | cut -c1-7)"
              if [ -n "${github_login}" ]; then
                echo "- ${commit_subject} (${short_sha}) by @${github_login}"
              else
                git_name="$(git show -s --format='%an' "${commit_sha}" 2>/dev/null || echo unknown)"
                echo "- ${commit_subject} (${short_sha}) by ${git_name}"
              fi
            done < <(git log --no-merges --pretty=format:'%H|%s' "${RELEASE_RANGE}")
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          preserve_order: true
          generate_release_notes: true
          append_body: true
          files: |
            artifacts/release-ubuntu/vamposer-linux
            artifacts/release-ubuntu/vamposer-linux.sha256
            artifacts/release-ubuntu/*-linux.zip
            artifacts/release-ubuntu/vamposer_*_amd64.deb
            artifacts/release-ubuntu/vamposer-*-ubuntu.tar.gz
            artifacts/release-fedora-*/vamposer-*-fedora*.tar.gz
            artifacts/release-fedora-*/**/*.rpm
            artifacts/release-arch/vamposer-*-arch.tar.gz
            artifacts/release-arch/src/vamposer
            artifacts/release-flatpak/vamposer-*-flatpak.flatpak

  persist-version:
    name: Persist meson.build version
    needs: publish-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Persist meson.build version to default branch
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          export TAG_VERSION

          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          git checkout "${DEFAULT_BRANCH}"

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path('meson.build')
          text = path.read_text()
          tag_version = os.environ['TAG_VERSION']
          updated, count = re.subn(
              r"^(project\([^\n]*?version:\s*')[^']+('.*\))$",
              lambda match: f"{match.group(1)}{tag_version}{match.group(2)}",
              text,
              flags=re.M,
          )

          if count != 1:
              raise SystemExit(f'Expected exactly one project() version update, got {count}')

          path.write_text(updated)
          PY

          if git diff --quiet -- meson.build; then
            echo "No version commit needed on ${DEFAULT_BRANCH}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meson.build
          git commit -m "chore(release): bump meson version to ${TAG_VERSION}"

          if ! git push origin "HEAD:${DEFAULT_BRANCH}"; then
            echo "::warning::Failed to push version bump commit to ${DEFAULT_BRANCH}."
            echo "::warning::Please push meson.build version update manually."
          fi
