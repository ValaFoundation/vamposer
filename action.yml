name: Setup Vamposer
description: Install Vamposer binary from GitHub Releases and add it to PATH

inputs:
  version:
    description: "Release version (e.g. v0.6.3 or 0.6.3). Use latest for latest release."
    required: false
    default: latest

outputs:
  installed-version:
    description: "Installed Vamposer version"
    value: ${{ steps.report.outputs.installed_version }}

runs:
  using: composite
  steps:
    - name: Install Vamposer runtime dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail

        if command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 \
            libgee-0.8-2 \
            libjson-glib-1.0-0
        fi

    - name: Install Vamposer (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail

        version='${{ inputs.version }}'
        if [[ "$version" == "latest" ]]; then
          base_url='https://github.com/ValaFoundation/vamposer/releases/latest/download'
        else
          if [[ "$version" != v* ]]; then
            version="v${version}"
          fi
          base_url="https://github.com/ValaFoundation/vamposer/releases/download/${version}"
        fi

        tmp_dir="${RUNNER_TEMP}/vamposer-setup"
        mkdir -p "$tmp_dir"

        asset_name='vamposer-linux'
        checksum_name='vamposer-linux.sha256'
        asset_path="$tmp_dir/${asset_name}"
        checksum_path="$tmp_dir/${checksum_name}"

        curl -fsSL -o "$asset_path" "${base_url}/${asset_name}"
        curl -fsSL -o "$checksum_path" "${base_url}/${checksum_name}"

        expected_checksum="$(awk '{print $1; exit}' "$checksum_path")"
        actual_checksum="$(sha256sum "$asset_path" | awk '{print $1}')"
        if [[ -z "$expected_checksum" || "$expected_checksum" != "$actual_checksum" ]]; then
          echo 'Checksum verification failed.' >&2
          exit 1
        fi

        chmod +x "$asset_path"
        install_dir="${RUNNER_TEMP}/vamposer-bin"
        mkdir -p "$install_dir"
        cp "$asset_path" "$install_dir/vamposer"
        chmod +x "$install_dir/vamposer"

        echo "$install_dir" >> "$GITHUB_PATH"

    - name: Install Vamposer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $version = '${{ inputs.version }}'
        if ($version -eq 'latest') {
          $baseUrl = 'https://github.com/ValaFoundation/vamposer/releases/latest/download'
        } else {
          if (-not $version.StartsWith('v')) {
            $version = "v$version"
          }
          $baseUrl = "https://github.com/ValaFoundation/vamposer/releases/download/$version"
        }

        $tmpDir = Join-Path $env:RUNNER_TEMP 'vamposer-setup'
        New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

        $assetName = 'vamposer.exe'
        $checksumName = 'vamposer.exe.sha256'
        $assetPath = Join-Path $tmpDir $assetName
        $checksumPath = Join-Path $tmpDir $checksumName

        Invoke-WebRequest -Uri "$baseUrl/$assetName" -OutFile $assetPath
        Invoke-WebRequest -Uri "$baseUrl/$checksumName" -OutFile $checksumPath

        $expectedChecksum = (Get-Content $checksumPath | Select-Object -First 1).Split(' ')[0].Trim().ToLower()
        $actualChecksum = (Get-FileHash -Algorithm SHA256 $assetPath).Hash.ToLower()
        if ([string]::IsNullOrWhiteSpace($expectedChecksum) -or $expectedChecksum -ne $actualChecksum) {
          throw 'Checksum verification failed.'
        }

        $installDir = Join-Path $env:RUNNER_TEMP 'vamposer-bin'
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null
        Copy-Item -Force $assetPath (Join-Path $installDir 'vamposer.exe')

        Add-Content -Path $env:GITHUB_PATH -Value $installDir

    - name: Unsupported runner OS
      if: runner.os != 'Linux' && runner.os != 'Windows'
      shell: bash
      run: |
        echo "Unsupported runner OS: $RUNNER_OS" >&2
        exit 1

    - name: Report installed version
      id: report
      shell: bash
      run: |
        set -euo pipefail
        if command -v vamposer >/dev/null 2>&1; then
          value="$(vamposer version | tail -n 1 | awk '{print $NF}')"
        else
          value='unknown'
        fi
        echo "installed_version=${value}" >> "$GITHUB_OUTPUT"
